name: Apply Production Audit Phase One

on:
  push:
    branches:
      - fix/connect-t-complete-production-audit
    paths:
      - scripts/apply-audit-phase1.mjs
      - .github/workflows/apply-audit-phase1.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-audit-phase1.mjs
      - .github/workflows/apply-audit-phase1.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/connect-t-complete-production-audit
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply deterministic source changes
        run: node scripts/apply-audit-phase1.mjs
      - name: Install Expo SecureStore aligned to SDK
        working-directory: mobile
        run: npx expo install expo-secure-store --npm
      - name: Install patched multipart parser
        working-directory: backend
        run: npm install multer@2.2.0 --save-exact --ignore-scripts --no-audit --no-fund
      - name: Validate backend
        working-directory: backend
        run: |
          npm run check
          npm test
          npm audit --omit=dev --audit-level=high
      - name: Validate mobile
        working-directory: mobile
        run: |
          npm run doctor
          npm run test:api
          npm run typecheck
      - name: Commit phase-one implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend mobile
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "fix(auth,complaints): secure OTP resend and multipart image upload"
          git push origin HEAD:fix/connect-t-complete-production-audit
