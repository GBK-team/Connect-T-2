name: Fix Profile Complaint Route

on:
  push:
    branches:
      - fix/connect-t-complete-production-audit
    paths:
      - scripts/fix-profile-complaint-route.mjs
      - .github/workflows/fix-profile-complaint-route.yml

permissions:
  contents: write

concurrency:
  group: connect-t-profile-route-hotfix
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/connect-t-complete-production-audit
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/fix-profile-complaint-route.mjs
      - name: Commit corrected route
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile/screens/CivicProfileScreen.tsx
          git commit -m "fix(navigation): use role-neutral complaint list from shared profile"
          git push origin HEAD:fix/connect-t-complete-production-audit
