name: Apply Production Audit Phase Two

on:
  push:
    branches:
      - fix/connect-t-complete-production-audit
    paths:
      - scripts/apply-audit-phase2.mjs
      - .github/workflows/apply-audit-phase2.yml

permissions:
  contents: write

concurrency:
  group: connect-t-audit-phase-two
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/connect-t-complete-production-audit
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply deterministic source changes
        run: node scripts/apply-audit-phase2.mjs
      - name: Commit phase-two implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend mobile
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "fix(profile,navigation): standardize logout and direct portal switching"
            git push origin HEAD:fix/connect-t-complete-production-audit
          fi
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Validate backend
        working-directory: backend
        run: |
          npm run check
          npm test
          npm audit --omit=dev --audit-level=high
      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci --ignore-scripts --legacy-peer-deps --no-audit --no-fund
      - name: Validate mobile
        working-directory: mobile
        run: |
          npm run doctor
          npm run test:api
          npm run typecheck
