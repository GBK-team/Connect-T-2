name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - "tsconfig.json"
      - "types/**"
      - ".github/workflows/android-apk.yml"

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build native Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      EXPO_PUBLIC_API_URL: https://connect-t-2.onrender.com
      NODE_ENV: production
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Prepare native Android build
        working-directory: mobile/android
        run: chmod +x ./gradlew

      - name: Build release APK with Gradle
        working-directory: mobile/android
        run: ./gradlew clean :app:assembleRelease --no-daemon --stacktrace -PreactNativeArchitectures=arm64-v8a

      - name: List APK outputs
        if: always()
        run: find mobile/android/app/build/outputs/apk -type f -name "*.apk" -print -exec ls -lh {} \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: connect-t-native-release-apk
          path: mobile/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Write build summary
        if: always()
        run: |
          echo "## Connect-T Native Android APK Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Build type: Gradle release APK" >> "$GITHUB_STEP_SUMMARY"
          echo "Backend: https://connect-t-2.onrender.com" >> "$GITHUB_STEP_SUMMARY"
          echo "Architecture: arm64-v8a" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the APK from the workflow Artifacts section: connect-t-native-release-apk" >> "$GITHUB_STEP_SUMMARY"
