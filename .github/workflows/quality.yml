name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend security and syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run check
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high

  mobile:
    name: Mobile quality and Android export
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install Expo-aligned mobile dependencies
        run: npm install --ignore-scripts --legacy-peer-deps --no-audit --no-fund
      - name: Commit regenerated mobile lockfile
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if git diff --quiet package-lock.json; then
            echo "Mobile lockfile is already aligned."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Align mobile lockfile with Expo SDK 56"
          git push origin HEAD:${{ github.head_ref }}
      - name: Run Expo Doctor
        shell: bash
        run: |
          set +e
          npm run doctor > doctor.log 2>&1
          status=$?
          cat doctor.log
          if [ "$status" -ne 0 ]; then
            summary=$(tail -n 12 doctor.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error title=Expo Doctor failed::$summary"
          fi
          exit "$status"
      - name: Upload Expo Doctor diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expo-doctor-diagnostics
          path: mobile/doctor.log
          if-no-files-found: ignore
          retention-days: 3
      - run: npm run test:api
      - run: npm run typecheck
      - run: npm run export:android
      - run: npm audit --omit=dev --audit-level=high

  web:
    name: Web typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
