name: Fix Admin Logout Modal Placement

on:
  push:
    branches:
      - fix/connect-t-complete-production-audit
    paths:
      - scripts/fix-admin-logout-modal.mjs
      - .github/workflows/fix-admin-logout-modal.yml

permissions:
  contents: write

concurrency:
  group: connect-t-admin-logout-hotfix
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/connect-t-complete-production-audit
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/fix-admin-logout-modal.mjs
      - name: Commit corrected component
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile/app/'(tabs)'/admin.tsx
          git commit -m "fix(navigation): place Nagarsevak logout confirmation at screen root"
          git push origin HEAD:fix/connect-t-complete-production-audit
