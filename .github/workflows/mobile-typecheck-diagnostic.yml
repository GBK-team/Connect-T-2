name: Mobile Typecheck Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch pull request source quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar --extract --gzip --strip-components=1
      - name: Install mobile dependencies quietly
        working-directory: mobile
        run: npm ci --ignore-scripts --legacy-peer-deps --no-audit --no-fund --silent
      - name: Run focused TypeScript validation
        working-directory: mobile
        shell: bash
        run: |
          set +e
          output=$(npx tsc --noEmit -p tsconfig.json --pretty false 2>&1)
          status=$?
          printf '%s\n' "$output"
          exit $status
