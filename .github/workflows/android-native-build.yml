name: Native Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/android-native-build.yml"

concurrency:
  group: native-android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build native Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      EXPO_PUBLIC_API_URL: https://connect-t-2.onrender.com
      NODE_ENV: development

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show source commit
        run: |
          git rev-parse HEAD
          git log --oneline -5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"
          yes | sdkmanager --licenses || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: TypeScript check mobile
        working-directory: mobile
        run: npx tsc --noEmit -p tsconfig.json

      - name: Prepare Android project
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties
          node --version
          npm --version
          node --print "require.resolve('react-native/package.json', { paths: [process.cwd() + '/..'] })"
          node --print "require.resolve('@react-native/gradle-plugin/package.json', { paths: [process.cwd() + '/..'] })"
          node --print "require.resolve('expo-modules-autolinking/package.json', { paths: [process.cwd() + '/..'] })"

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          set -o pipefail
          ./gradlew clean :app:assembleDebug \
            --no-daemon \
            --max-workers=1 \
            --stacktrace \
            -PreactNativeArchitectures=arm64-v8a 2>&1 | tee ../../android-gradle-build.log

      - name: List APK outputs
        if: always()
        run: |
          find mobile/android/app/build/outputs/apk -type f -name "*.apk" -print -exec ls -lh {} \; || true

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-build-log
          path: android-gradle-build.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: connect-t-native-debug-apk
          path: mobile/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14
