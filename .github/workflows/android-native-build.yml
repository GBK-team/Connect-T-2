name: Native Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/android-native-build.yml"

concurrency:
  group: native-android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build internal-test ARM64 APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://newapp.e-bjp.in' }}
      NODE_ENV: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show source commit
        run: |
          git rev-parse HEAD
          git log --oneline -5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"
          yes | sdkmanager --licenses || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci --include=dev --legacy-peer-deps --no-audit --no-fund

      - name: Force Hermes compiler path
        working-directory: mobile
        run: |
          node scripts/ensure-hermesc.js
          ls -lh node_modules/react-native/sdks/hermesc/linux64-bin/hermesc
          node_modules/react-native/sdks/hermesc/linux64-bin/hermesc -version || true

      - name: TypeScript check
        working-directory: mobile
        run: npm run typecheck

      - name: Create local.properties
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Verify ARM64 split config
        run: |
          grep -n "splits\|abi\|universalApk\|abiFilters" mobile/android/app/build.gradle || true
          grep -q "universalApk false" mobile/android/app/build.gradle
          grep -q 'include "arm64-v8a"' mobile/android/app/build.gradle
          if grep -q "abiFilters" mobile/android/app/build.gradle; then
            echo "ERROR: abiFilters exists. Remove it."
            exit 1
          fi

      # Installable QA artifact only. Store releases use the EAS production AAB
      # workflow and its protected Play signing credentials.
      - name: Build internal-test ARM64 APK
        working-directory: mobile/android
        run: |
          ./gradlew clean :app:assembleRelease \
            --no-daemon \
            --max-workers=1 \
            --stacktrace \
            -x lint \
            -x lintVitalRelease \
            -x lintVitalAnalyzeRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.enableMinifyInReleaseBuilds=false \
            -Pandroid.enableShrinkResourcesInReleaseBuilds=false \
            -Pandroid.enablePngCrunchInReleaseBuilds=false

      - name: List APK outputs
        if: always()
        run: |
          find mobile/android/app/build/outputs/apk -type f -name "*.apk" -print -exec ls -lh {} \; || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: connect-t-arm64-internal-test-apk
          path: mobile/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14
